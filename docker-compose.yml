version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./tracez.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-64-char-random}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@1}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-divesh@9192}
      - ENVIRONMENT=production
      - CORS_ORIGINS=chrome-extension://
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend_data:
